<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySmarter | Login</title>
  <link rel="stylesheet" href="src/style.css">
</head>

<body>
<div class="login-container">
  <form id="loginform">
    <span class="kicker">Smart Study Planner</span>
    <h2>Welcome back</h2>
    <p>Sign in to manage your study plan, stay on top of deadlines, and keep your weekly progress moving.</p>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" required>

    <button type="submit">Login</button>

    <p class="helper" id="login-message"></p>
  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginform");
    const message = document.getElementById("login-message");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        message.style.color = "#fb7185";
        message.textContent = "Please enter both username and password.";
        return;
      }

      try {
        localStorage.removeItem("token");
        localStorage.removeItem("currentUser");

        let response = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        if (response.status === 401) {
          response = await fetch("http://localhost:3000/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
          });
        }

        const data = await response.json();

        if (!response.ok) {
          message.style.color = "#fb7185";
          message.textContent = data.message || "Authentication failed.";
          return;
        }

        if (!data.token) {
          message.style.color = "#fb7185";
          message.textContent = "No token returned from server.";
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("currentUser", JSON.stringify(data.user || {}));

        message.style.color = "#34d399";
        message.textContent = data.message || "Success.";

        setTimeout(() => {
          window.location.href = "home.html";
        }, 700);
      } catch (error) {
        console.error(error);
        message.style.color = "#fb7185";
        message.textContent = "Unable to connect to the server.";
      }
    });
  });
</script>
</body>
</html>
