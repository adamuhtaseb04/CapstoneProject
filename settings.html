<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySmarter | Settings</title>
  <link rel="stylesheet" href="src/nav-style.css">
  <link rel="stylesheet" href="src/dropdown.css">
</head>
<body>
<header><nav><ul class="nav-links">
  <li><a href="home.html">Home</a></li><li><a href="dashboard.html">Student Dashboard</a></li><li><a href="studyplan.html">Generated Study Plan</a></li><li><a href="progress.html">Progress Tracking</a></li><li><a href="taskdetail.html">Schedule & Task Detail</a></li><li><a href="settings.html">Settings</a></li><li><a href="help.html">Help</a></li>
</ul></nav></header>
<main>
  <section class="hero reveal" data-reveal>
    <span class="kicker">Settings</span>
    <h1>Customize how you study</h1>
    <p></p>
  </section>
</main>
<div class="container reveal delay-1" data-reveal>
  <div class="form-shell">
    <div class="form-grid">
      <div class="field"><label for="name">Full Name</label><input type="text" id="name" placeholder="Alex Johnson"></div>
      <div class="field"><label for="email">Email Address</label><input type="email" id="email" placeholder="alex@email.com"></div>
      <div class="field"><label for="university">University</label><input type="text" id="university" placeholder="Example University"></div>
      <div class="field"><label for="major">Major</label><input type="text" id="major" placeholder="Computer Information Technology"></div>
      <div class="field"><label for="hours">Preferred Study Hours per Day</label><select id="hours"><option>1 hr</option><option>2 hrs</option><option>3 hrs</option><option>4 hrs</option></select></div>
      <div class="field"><label for="break_length">Break Duration</label><select id="break_length"><option>5 minutes</option><option>10 minutes</option><option>15 minutes</option><option>30 minutes</option></select></div>
      <div class="full">
        <label>Notification Preferences</label>
        <div class="checkbox-grid">
          <label class="checkbox-pill"><input type="checkbox"> Study session reminders</label>
          <label class="checkbox-pill"><input type="checkbox"> Assignment due date alerts</label>
          <label class="checkbox-pill"><input type="checkbox"> Weekly progress reports</label>
          <label class="checkbox-pill"><input type="checkbox"> Goal achievement notifications</label>
        </div>
      </div>
      <div class="full">
        <label>Workload Intensity</label>
        <div class="checkbox-grid">
          <label class="checkbox-pill"><input type="radio" name="intensity"> Light</label>
          <label class="checkbox-pill"><input type="radio" name="intensity"> Moderate</label>
          <label class="checkbox-pill"><input type="radio" name="intensity"> Intensive</label>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <p class="helper">Changes are styled as a polished settings panel with stronger visual hierarchy.</p>
      <button type="button">Save Preferences</button>
    </div>
  </div>
</div>
<script src="src/ui.js" defer></script>
</body>
</html>
